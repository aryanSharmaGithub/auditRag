<!DOCTYPE html>
<!--
  AuditRAG web UI — a single static file, no build step, no framework.
  It renders the structured `claims` and `chunks` from POST /ask directly:
  each sentence keeps its citation superscripts (hover for the source text
  and page) and its faithfulness verdict badge. "Export evidence PDF" posts
  the answer back to POST /report.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuditRAG</title>
  <style>
    :root {
      --bg: #f7f7f6; --panel: #ffffff; --ink: #1e1e1e; --muted: #6e6e6e;
      --line: #e2e2df; --accent: #2b5c8a;
      --supported: #167a3d; --partial: #b97814; --unsupported: #b42020;
      --uncited: #6e6e6e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    main { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
    header h1 { margin: 0; font-size: 26px; letter-spacing: -0.01em; }
    header p { margin: 4px 0 0; color: var(--muted); }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 10px; padding: 18px 20px;
    }
    form.ask { margin: 22px 0; display: flex; flex-direction: column; gap: 12px; }
    .ask textarea {
      width: 100%; min-height: 62px; resize: vertical; padding: 11px 13px;
      border: 1px solid var(--line); border-radius: 8px; font: inherit; background: #fff;
    }
    .ask .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .ask label.check { display: flex; align-items: center; gap: 7px; color: var(--muted); cursor: pointer; }
    .ask .spacer { flex: 1; }
    button {
      font: inherit; border: 1px solid var(--line); background: #fff; color: var(--ink);
      padding: 9px 16px; border-radius: 8px; cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button:disabled { opacity: 0.55; cursor: default; }
    .hint { color: var(--muted); font-size: 13px; }
    section.result { margin-top: 24px; display: none; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 24px 0 10px; }
    .answer .claim { margin: 0 0 4px; padding: 3px 0; }
    /* Citation superscript chip + hover card */
    .cite {
      position: relative; display: inline-block; cursor: help;
      font-size: 0.72em; vertical-align: super; color: var(--accent);
      font-weight: 600; margin-left: 1px;
    }
    .cite > .pop {
      display: none; position: absolute; left: 0; top: 1.4em; z-index: 20;
      width: 320px; background: #fff; border: 1px solid var(--line);
      border-radius: 8px; padding: 10px 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      font-size: 13px; line-height: 1.5; vertical-align: baseline; font-weight: 400;
      color: var(--ink); white-space: normal;
    }
    .cite:hover > .pop, .cite:focus-within > .pop { display: block; }
    .pop .src { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .cite.invalid { color: var(--unsupported); }
    /* Verdict badges */
    .badge {
      display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; padding: 1px 7px; border-radius: 5px; margin-left: 6px;
      vertical-align: middle; color: #fff;
    }
    .badge.supported { background: var(--supported); }
    .badge.partial { background: var(--partial); }
    .badge.unsupported { background: var(--unsupported); }
    .badge.uncited { background: var(--uncited); }
    .badge.none { background: #fff; color: var(--muted); border: 1px dashed var(--line); }
    .note { color: var(--muted); font-size: 13px; margin: 1px 0 0 2px; }
    .sources li { margin-bottom: 9px; }
    .sources .src-head { font-weight: 600; }
    .sources .src-text { color: #555; font-size: 13px; }
    .banner {
      border-radius: 8px; padding: 10px 13px; margin-top: 14px; font-size: 13px;
      background: #fbf3e5; border: 1px solid #ecd9b0; color: #6b4c12;
    }
    .banner.error { background: #fbeaea; border-color: #efc4c4; color: #8a1f1f; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 8px; }
    .legend .badge { color: #fff; }
  </style>
</head>
<body>
<main>
  <header>
    <h1>AuditRAG</h1>
    <p>RAG answers you can verify — hover any citation for its source, check every claim against its evidence.</p>
  </header>

  <form class="ask card" id="ask-form">
    <textarea id="question" placeholder="Ask a question about your ingested documents…" required></textarea>
    <div class="row">
      <label class="check"><input type="checkbox" id="verify" checked /> Verify faithfulness</label>
      <label class="check">Top-k <input type="number" id="topk" value="6" min="1" max="50" style="width:56px" /></label>
      <span class="spacer"></span>
      <button type="submit" class="primary" id="ask-btn">Ask</button>
    </div>
    <div class="hint" id="health"></div>
  </form>

  <section class="result" id="result">
    <div id="banners"></div>
    <h2>Answer</h2>
    <div class="answer card" id="answer"></div>
    <div class="legend" id="legend"></div>
    <h2>Sources</h2>
    <ul class="sources card" id="sources"></ul>
    <div class="row" style="margin-top:16px">
      <button id="export-btn">Export evidence PDF</button>
      <span class="meta" id="export-status"></span>
    </div>
  </section>
</main>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
let lastAnswer = null;

// Refresh index stats so the user knows whether anything is ingested.
async function refreshHealth() {
  try {
    const r = await fetch("/health");
    const h = await r.json();
    $("health").textContent =
      `Index: ${h.documents} document(s), ${h.chunks} chunk(s). Model set in auditrag.yaml.`;
  } catch { /* health is advisory only */ }
}

function banner(msg, kind) {
  const el = document.createElement("div");
  el.className = "banner" + (kind ? " " + kind : "");
  el.textContent = msg;
  return el;
}

// Map each chunk_id to its 1-based citation label and source chunk.
function buildCiteMap(chunks) {
  const map = new Map();
  chunks.forEach((hit, i) => map.set(hit.chunk.chunk_id, { label: i + 1, chunk: hit.chunk }));
  return map;
}

function citationChip(entry) {
  const span = document.createElement("span");
  span.className = "cite";
  span.tabIndex = 0;
  span.textContent = `[${entry.label}]`;
  const pop = document.createElement("span");
  pop.className = "pop";
  const src = document.createElement("div");
  src.className = "src";
  src.textContent = `${entry.chunk.doc_name} · p.${entry.chunk.page} · ${entry.chunk.chunk_id}`;
  const body = document.createElement("div");
  body.textContent = entry.chunk.text;
  pop.append(src, body);
  span.append(pop);
  return span;
}

function verdictBadge(verified, verdict) {
  const b = document.createElement("span");
  const kind = !verified ? "none" : (verdict || "none");
  b.className = "badge " + kind;
  b.textContent = !verified ? "unverified" : (verdict || "no verdict");
  return b;
}

function renderAnswer(answer) {
  const citeMap = buildCiteMap(answer.chunks);
  const box = $("answer");
  box.innerHTML = "";

  answer.claims.forEach((claim) => {
    const p = document.createElement("p");
    p.className = "claim";
    p.append(document.createTextNode(claim.text + " "));
    claim.chunk_ids.forEach((cid) => {
      const entry = citeMap.get(cid);
      if (entry) p.append(citationChip(entry));
    });
    (claim.invalid_labels || []).forEach((n) => {
      const bad = document.createElement("span");
      bad.className = "cite invalid";
      bad.textContent = `[${n}?]`;
      bad.title = "The model cited a source that was never provided.";
      p.append(bad);
    });
    if (answer.verified) p.append(verdictBadge(true, claim.verdict));
    box.append(p);
    if (answer.verified && claim.verdict_note) {
      const note = document.createElement("div");
      note.className = "note";
      note.textContent = claim.verdict_note;
      box.append(note);
    }
  });

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = `model: ${answer.model}${answer.verified ? " · faithfulness verified" : ""}`;
  box.append(meta);

  // Legend (only meaningful once verified).
  const legend = $("legend");
  legend.innerHTML = "";
  if (answer.verified) {
    ["supported", "partial", "unsupported", "uncited"].forEach((v) => {
      const wrap = document.createElement("span");
      const b = document.createElement("span");
      b.className = "badge " + v; b.textContent = v;
      wrap.append(b);
      legend.append(wrap);
    });
  }

  // Sources panel.
  const list = $("sources");
  list.innerHTML = "";
  const cited = new Set(answer.claims.flatMap((c) => c.chunk_ids));
  answer.chunks.forEach((hit, i) => {
    const li = document.createElement("li");
    const head = document.createElement("div");
    head.className = "src-head";
    head.textContent = `[${i + 1}] ${hit.chunk.doc_name} · p.${hit.chunk.page}` +
      (cited.has(hit.chunk.chunk_id) ? " · cited" : "");
    const text = document.createElement("div");
    text.className = "src-text";
    text.textContent = hit.chunk.text;
    li.append(head, text);
    list.append(li);
  });
}

async function onAsk(event) {
  event.preventDefault();
  const question = $("question").value.trim();
  if (!question) return;
  const btn = $("ask-btn");
  btn.disabled = true; btn.textContent = "Thinking…";
  $("banners").innerHTML = "";
  $("export-status").textContent = "";

  try {
    const r = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question,
        verify: $("verify").checked,
        top_k: Number($("topk").value) || 6,
      }),
    });
    if (!r.ok) {
      const detail = (await r.json().catch(() => ({}))).detail || `HTTP ${r.status}`;
      $("result").style.display = "block";
      $("answer").innerHTML = ""; $("sources").innerHTML = ""; $("legend").innerHTML = "";
      $("banners").append(banner(detail, "error"));
      return;
    }
    const answer = await r.json();
    lastAnswer = answer;
    $("result").style.display = "block";
    (answer.warnings || []).forEach((w) => $("banners").append(banner(w)));
    renderAnswer(answer);
  } catch (err) {
    $("result").style.display = "block";
    $("banners").append(banner("Request failed: " + err.message, "error"));
  } finally {
    btn.disabled = false; btn.textContent = "Ask";
  }
}

async function onExport() {
  if (!lastAnswer) return;
  const status = $("export-status");
  status.textContent = "Building report…";
  try {
    const r = await fetch("/report", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ answers: [lastAnswer] }),
    });
    if (!r.ok) { status.textContent = "Export failed."; return; }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "auditrag-evidence.pdf";
    document.body.append(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    status.textContent = "Downloaded.";
  } catch (err) {
    status.textContent = "Export failed: " + err.message;
  }
}

$("ask-form").addEventListener("submit", onAsk);
$("export-btn").addEventListener("click", onExport);
refreshHealth();
</script>
</body>
</html>
